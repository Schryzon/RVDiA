{% extends "base.html" %}

{% block content %}
<section class="flex justify-center items-center min-h-[70vh] py-8 px-4">
    <div class="glass-card-style p-8 md:p-10 max-w-md w-full text-center hover:shadow-2xl">
        <!-- SVG Avatar Icon -->
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-accent/10 text-accent mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/>
                <path stroke-linecap="round" d="M5 20a7 7 0 0114 0"/>
            </svg>
        </div>

        <h1 class="text-3xl font-black mb-2 text-white bg-gradient-to-r from-white via-slate-100 to-accent bg-clip-text text-transparent">
            {{ i18n.login_title }}
        </h1>
        <p class="text-sm text-slate-400 mb-8 max-w-sm mx-auto leading-relaxed">
            {{ i18n.login_desc }}
        </p>

        <!-- Features Bullet Points -->
        <div class="space-y-3.5 mb-8 text-left max-w-xs mx-auto">
            <div class="flex items-center gap-3 text-sm text-slate-300">
                <span class="text-lg w-7 h-7 rounded-lg bg-white/[0.04] border border-white/10 flex items-center justify-center">⚔️</span>
                <span>{{ i18n.login_feature_rpg }}</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-slate-300">
                <span class="text-lg w-7 h-7 rounded-lg bg-white/[0.04] border border-white/10 flex items-center justify-center">🎒</span>
                <span>{{ i18n.login_feature_inventory }}</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-slate-300">
                <span class="text-lg w-7 h-7 rounded-lg bg-white/[0.04] border border-white/10 flex items-center justify-center">💬</span>
                <span>{{ i18n.login_feature_chat }}</span>
            </div>
        </div>

        <!-- Login Button -->
        <a href="/api/auth/login" class="w-full bg-[#5865F2] hover:bg-[#4752c4] text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all duration-300 transform hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-2.5">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
            <span>{{ i18n.login_button }}</span>
        </a>
    </div>
</section>
{% endblock %}
